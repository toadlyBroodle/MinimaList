Name: MinimaList
Summary: Local-only outliner with no cloud, no ads, no tracking
Description: |-
  MinimaList is a minimal outline and task manager that stores everything locally.
  Resurrected from an abandoned 2018 Play Store release (ca.toadlybroodledev.sublist);
  all cloud surfaces removed: Firebase (Realtime Database, Analytics, FCM,
  Crashlytics), AdMob, Google Sign-In, App Invites, Cast, Play Billing.

  Features: nested outline rows, row completion, collapse/expand subtrees,
  per-row reminders via AlarmManager, JSON and plain-text export/import,
  home-screen widget, dark theme with customizable accent colors, and search.

  All data is stored in a local Room database. No account required. No network
  connections. Permissions: POST_NOTIFICATIONS (optional, for reminders) and
  RECEIVE_BOOT_COMPLETED (to reschedule reminders after reboot).

